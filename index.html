<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b3d2e">
  <title>World Cup Predictions</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="logged-out">
  <header class="topbar">
    <!-- Animated hamburger (from Uiverse.io by Cevorob), recoloured to fit -->
    <label class="burger" for="burger-toggle" aria-label="Open menu">
      <input type="checkbox" id="burger-toggle">
      <span></span><span></span><span></span>
    </label>
    <div class="brand">World Cup ’26</div>
    <span class="topbar-spacer"></span>
  </header>

  <nav id="side-menu" class="side-menu" aria-label="Main menu">
    <div class="menu-points" id="menu-points">0 pts</div>
    <button class="nav" data-nav="home">Home</button>
    <button class="nav" data-nav="results">Results</button>
    <button class="nav" data-nav="lineups">Lineups</button>
    <button class="nav" data-nav="bracket">Bracket</button>
    <button class="nav" data-nav="score">My Score</button>
    <div class="menu-foot" id="menu-user"></div>
  </nav>
  <div id="backdrop" class="backdrop"></div>

  <main id="view" class="view"></main>

  <!-- Login / sign-up overlay, shown when no user is signed in -->
  <div id="auth-screen" class="auth-screen"></div>

  <!-- Supabase client, vendored locally so the site never depends on a CDN -->
  <script src="js/vendor/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/espn.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/results.js"></script>
  <script src="js/views/lineups.js"></script>
  <script src="js/views/bracket.js"></script>
  <script src="js/views/score.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
